<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <title>TensorFlow.js browser example</title>

    <!-- Load TensorFlow.js from a script tag -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-vis"></script>
  </head>
  <body>
    <h1>TensorFlow.js</h1>
    <script>
        async function run() {
            await tf.ready();
            //import csv
            const housesSalesDataset = tf.data.csv('/MDAM K1 Day 2 part 1 ud af2 - section 3/4.1/kc_house_data.csv');

            // visualise the data
            const pointsDataset = housesSalesDataset.map(record => ({ x: record.sqft_living, y: record.price }));
            const points = await pointsDataset.toArray();
            plot(points, 'Square Feet');

            // shuffle data to ensure random distribution when training and testing
            tf.util.shuffle(points); 
            console.log("shuffling rows:", points.length)
            
            // extract feature and store in a tensor
            const featureValues = points.map(p => p.x);
            const featureTensor = tf.tensor2d(featureValues, [featureValues.length, 1]);
            console.log("extract features to a tensor:", featureTensor.shape);

            // extract label and store it in a tensor
            const labelValues = points.map(p => p.y);
            const labelTensor = tf.tensor2d(labelValues, [labelValues.length, 1]);
            console.log("extract labels to a tensor:", labelTensor.shape);

            // normalise features and labels
            const normalisedFeature = await normalise(featureTensor);
            const normalisedLabel = await normalise(labelTensor);
            console.log("normalizng features and labels...");

            // calculate the number of rows for training and testing
            const { trainSize: calculatedTrainSize, testSize: calculatedTestSize } = calcTrainSizeAndTestSize(normalisedFeature, 0.8);

            // split arrays into training and testing tensors
            const [trainFeature, testFeature] = tf.split(normalisedFeature.normalisedTensor, [calculatedTrainSize, calculatedTestSize]);
            const [trainLabel, testLabel] = tf.split(normalisedLabel.normalisedTensor, [calculatedTrainSize, calculatedTestSize]);
            console.log("split arrays(feature and label) into training and testing tensors:", trainFeature.shape, testFeature.shape, trainLabel.shape, testLabel.shape);
            console.log(tf.memory());
       
        }

        // calcu sizes depending on feature tensor and train percentage
        function calcTrainSizeAndTestSize(featureTensor, trainPercentage) {
            const totalRows = featureTensor.normalisedTensor.shape[0];
            const trainSize = Math.floor(totalRows * trainPercentage);
            const testSize = totalRows - trainSize;
            return { trainSize, testSize };
        }

        function plot(points, featureName) {
            tfvis.render.scatterplot(
                {name: `${featureName} vs House Price`},
                {values: [points], series: ['original']},
                {
                    xLabel: featureName,
                    yLabel: 'Price',
                }
            );
        }

        // normalise features and labels
        async function normalise(tensor) {
            const max = tensor.max();
            const min = tensor.min();
            const normalisedTensor = tensor.sub(min).div(max.sub(min));
            return { normalisedTensor, min, max };   
        }

        // denormalise a tensor
        function denormalise(tensor, min, max) {
            return tensor.mul(max.sub(min)).add(min);
        }

        run();
    </script>
  </body>
</html>
