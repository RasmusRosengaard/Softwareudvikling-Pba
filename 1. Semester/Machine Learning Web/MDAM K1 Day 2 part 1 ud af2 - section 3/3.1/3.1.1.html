<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8" />
    <title>TensorFlow.js browser example</title>

    <!-- Load TensorFlow.js from a script tag -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  </head>
  <body>
    <h1>TensorFlow.js example</h1>
    <h2>Open the console to see the results.</h2>
    <script>
    const xs = tf.tensor1d([1,2,3]);
    const ys = xs.mul(tf.scalar(5)); // Ganger alle elementer i xs med 5
    ys.print();

    xs.add([1, 1, 1]).print(); // skal matche antal elementer i xs

    const xs2 = tf.tensor2d([[1,2,3], [3,2,1]]);
    const ys2 = xs2.mul(tf.scalar(5));
    ys2.print();

    // add same dimension: ys2.add([1,1,1]).print();
    // how to add different dimension: ys2.add(tf.tensor1d([1,1,1])).print();

    // if add 1d to 2d, adds to every element in 2d:
    ys2.add([[1,1,1]]).print();

    </script>
  </body>
</html>
